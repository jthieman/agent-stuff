packages:
  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^25.6.2
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@mongodb-js/zstd": false
  better-sqlite3: false
  cbor-extract: false
  esbuild: false
  node-liblzma: false
