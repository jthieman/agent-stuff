packages:
  - packages/*

catalogMode: prefer

# Supply-chain cooldown for manual installs (`pnpm add` / `pnpm update`):
# refuse to resolve a version published less than this many MINUTES ago.
# 10080 = 7 days, mirroring the `default-days: 7` cooldown in
# .github/dependabot.yml so hand-run installs get the same guard as CI bumps.
# This is what defends against install-a-just-published-malicious-version
# worms. Lockfile installs are unaffected (they don't re-resolve). Drop to
# 4320 (3 days) to match the semver-minor/patch tier if velocity matters.
minimumReleaseAge: 10080

catalog:
  "@aws-sdk/client-s3": ^3.1020.0
  "@types/node": ^25.6.2
  "@types/pg": ^8.20.0
  pg: ^8.20.0
  testcontainers: ^12.0.1
  typescript: ^7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.2.1
  "@azure/storage-blob": ^12.33.0
overrides:
  vite: "catalog:"
  vitest: "4.1.9"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@mongodb-js/zstd": false
  better-sqlite3: true
  cbor-extract: false
  cpu-features: false
  esbuild: false
  node-liblzma: false
  protobufjs: false
  ssh2: false
