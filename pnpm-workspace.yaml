packages:
  - packages/*

catalogMode: prefer

catalog:
  "@aws-sdk/client-s3": ^3.1020.0
  "@types/node": ^25.6.2
  "@types/pg": ^8.20.0
  pg: ^8.20.0
  testcontainers: ^12.0.1
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.2.1
  "@azure/storage-blob": ^12.33.0
overrides:
  vite: "catalog:"
  vitest: "4.1.9"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@mongodb-js/zstd": false
  better-sqlite3: true
  cbor-extract: false
  cpu-features: false
  esbuild: false
  node-liblzma: false
  protobufjs: false
  ssh2: false
